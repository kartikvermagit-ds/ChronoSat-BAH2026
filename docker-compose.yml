version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/docker/Dockerfile
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    depends_on:
      - api
